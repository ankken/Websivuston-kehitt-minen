<!doctype html>

<html lang="en">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="UTF-8" />
    <title>Tiedosto</title>

    <style>
      .grid-container {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-gap: 10px;
      }

      .grid-item {
        background-color: rgb(137, 239, 137);
        padding: 20px;
        text-align: center;
      }
    </style>

    <style>
      .flex-container {
        display: flex;
        justify-content: space-around;
        align-items: center;
      }

      .box {
        background-color: rgb(86, 203, 242);
        padding: 20px;
        text-align: center;
      }
    </style>
    <style>
      .responsive-box {
        padding: 20px;
        text-align: center;
      }

      @media (max-width: 600px) {
        .responsive-box {
          background-color: rgb(236, 121, 121);
        }
      }

      @media (min-width: 601px) {
        .responsive-box {
          background-color: lightseagreen;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Minun nettisivut</h1>
      <nav>
        <ul>
          <li><a href="#about">Tietoja</a></li>
          <li><a href="#services">Palvelut</a></li>
          <li><a href="#contact">Yhteystiedot</a></li>
        </ul>
      </nav>
    </header>
    <main>
      <section id="about">
        <h2>Tietoja minusta</h2>
        <p>Tämä kertoo minusta</p>
      </section>
    </main>

    <footer>
      <p>Copyright 2025</p>
    </footer>

    <div class="grid-container">
      <div class="grid-item">1</div>
      <div class="grid-item">2</div>
      <div class="grid-item">3</div>
      <div class="grid-item">4</div>
      <div class="grid-item">5</div>
      <div class="grid-item">6</div>
    </div>

    <div class="flex-container">
      <div class="box">Box 1</div>
      <div class="box">Box 2</div>
      <div class="box">Box 3</div>
    </div>

    <div class="responsive-box">Skaalaa jotta näet vaikutuksen</div>
  </body>
</html>
